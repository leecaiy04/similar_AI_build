name: Deploy to FNOS

on:
  workflow_dispatch:

concurrency:
  group: deploy-fnos-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy main to FNOS
    runs-on:
      - self-hosted
      - linux
      - x64
      - fnos
    env:
      DEPLOY_DIR: /vol1/1000/code/deplay/similar_AI_build
      SERVICE_NAME: similar-ai-build
      APP_PORT: 53120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure workflow runs for main only
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::This workflow only deploys the main branch. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Prepare deployment directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEPLOY_DIR}/dist"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          npm test

      - name: Build production bundle
        shell: bash
        run: |
          set -euo pipefail
          npm run build

      - name: Sync dist to deployment directory
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete dist/ "${DEPLOY_DIR}/dist/"

      - name: Restart service
        shell: bash
        env:
          FOS_SUDO_PASSWORD: ${{ secrets.FOS_SUDO_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${FOS_SUDO_PASSWORD:-}" ]; then
            echo "::error::Missing secret FOS_SUDO_PASSWORD"
            exit 1
          fi
          printf '%s\n' "${FOS_SUDO_PASSWORD}" | sudo -S -p '' systemctl restart "${SERVICE_NAME}"

      - name: Verify homepage
        shell: bash
        run: |
          set -euo pipefail
          sleep 3
          curl -fsS "http://127.0.0.1:${APP_PORT}/" > /tmp/similar-ai-build.html
          grep -qi "similar ai build" /tmp/similar-ai-build.html
