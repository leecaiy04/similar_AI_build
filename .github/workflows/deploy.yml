name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node Dependencies
        run: npm install

      - name: Build Web app
        run: npm run build:all

      - name: Package Dist (Zip)
        if: matrix.platform == 'linux'
        run: |
          zip -r htmldist_v${{ github.ref_name }}.zip dist/
          cp dist-single/index.html similar_ai_single_file.html

      - name: Build Tauri Package
        run: npm run tauri:build

      - name: Organize Artifacts
        shell: bash
        run: |
          mkdir -p release_artifacts
          if [ "${{ matrix.platform }}" == "linux" ]; then
            cp htmldist_v${{ github.ref_name }}.zip release_artifacts/ 2>/dev/null || true
            cp similar_ai_single_file.html release_artifacts/ 2>/dev/null || true
            find src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} release_artifacts/ \; 2>/dev/null || true
            find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} release_artifacts/ \; 2>/dev/null || true
          else
            find src-tauri/target/release/bundle/msi -name "*.msi" -exec cp {} release_artifacts/ \; 2>/dev/null || true
            find src-tauri/target/release/bundle/nsis -name "*.exe" -exec cp {} release_artifacts/ \; 2>/dev/null || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release_artifacts/*

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten Artifacts
        run: |
          mkdir -p final_release
          find artifacts -type f -exec cp {} final_release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: final_release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
