name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node Dependencies
        run: npm install --registry=https://registry.npmmirror.com

      - name: Build Web app
        run: npm run build:all

      - name: Build Tauri Package
        run: npm run tauri:build

      - name: Organize Built Artifacts
        shell: bash
        run: |
          mkdir -p bin-tauri
          if [ "${{ matrix.platform }}" == "linux" ]; then
            find src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} bin-tauri/ \; 2>/dev/null || true
            find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} bin-tauri/ \; 2>/dev/null || true
          else
            find src-tauri/target/release/bundle/msi -name "*.msi" -exec cp {} bin-tauri/ \; 2>/dev/null || true
            find src-tauri/target/release/bundle/nsis -name "*.exe" -exec cp {} bin-tauri/ \; 2>/dev/null || true
          fi
          echo "Organized artifacts in bin-tauri:"
          ls -R bin-tauri/

      - name: SFTP Deployment
        # SFTP 部署只在 Linux 构建中运行一次，避免重复部署 Web 文件和冲突
        if: matrix.platform == 'linux'
        env:
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: npm run deploy

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: bin-tauri/*

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          files: |
            bin-tauri/*.deb
            bin-tauri/*.AppImage
            bin-tauri/*.msi
            bin-tauri/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

